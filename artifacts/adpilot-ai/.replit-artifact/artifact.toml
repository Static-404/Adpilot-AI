kind = "web"
previewPath = "/"
title = "AdPilot AI"
version = "1.0.0"
id = "artifacts/adpilot-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18912

[services.development]
run = "pnpm --filter @workspace/adpilot-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/adpilot-ai", "run", "build" ]
publicDir = "artifacts/adpilot-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18912"
BASE_PATH = "/"
